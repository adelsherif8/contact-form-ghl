name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build plugin ZIP
        run: |
          mkdir -p build
          zip -r build/contact-form-ghl.zip \
            contact-form-ghl.php \
            logo.svg \
            vendor/ \
            composer.json \
            composer.lock \
            --exclude "vendor/yahnis-elsts/plugin-update-checker/tests/*" \
            --exclude "vendor/yahnis-elsts/plugin-update-checker/.git/*"
          echo "Built contact-form-ghl.zip (v${{ steps.version.outputs.VERSION }})"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Contact Form + GoHighLevel v${{ steps.version.outputs.VERSION }}

            ### Install / Update
            1. Download `contact-form-ghl.zip` below
            2. In WordPress: Plugins → Add New → Upload Plugin
            3. Or: your sites will auto-detect this release via the update checker

            ---
            *Auto-released via GitHub Actions*
          files: build/contact-form-ghl.zip
          draft: false
          prerelease: false
