<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="formGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" style="stop-color:#cbd5e1" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="64" x2="256" y2="64" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="128" x2="256" y2="128" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="192" x2="256" y2="192" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="64" y1="0" x2="64" y2="256" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="128" y1="0" x2="128" y2="256" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="192" y1="0" x2="192" y2="256" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Form card (left) -->
  <rect x="22" y="54" width="88" height="112" rx="10" fill="#1e3a5f" filter="url(#shadow)"/>
  <rect x="22" y="54" width="88" height="112" rx="10" fill="none" stroke="#334155" stroke-width="1.5"/>
  <!-- Form lines -->
  <rect x="34" y="76" width="64" height="7" rx="3.5" fill="#475569"/>
  <rect x="34" y="91" width="64" height="7" rx="3.5" fill="#334155"/>
  <rect x="34" y="108" width="40" height="7" rx="3.5" fill="#475569"/>
  <rect x="34" y="123" width="64" height="7" rx="3.5" fill="#334155"/>
  <rect x="34" y="138" width="50" height="7" rx="3.5" fill="#475569"/>
  <!-- Submit button on form -->
  <rect x="34" y="152" width="64" height="4" rx="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Arrow / connector -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- Arrow shaft -->
    <line x1="118" y1="110" x2="140" y2="110" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polyline points="133,103 141,110 133,117" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- GHL badge (right) -->
  <rect x="146" y="78" width="88" height="64" rx="10" fill="url(#accent)" filter="url(#shadow)"/>
  <!-- GHL text -->
  <text x="190" y="121" font-family="'Arial Black', 'Arial', sans-serif" font-weight="900" font-size="26" fill="#0f172a" text-anchor="middle" letter-spacing="-1">GHL</text>

  <!-- Bottom label -->
  <text x="128" y="193" font-family="'Arial', sans-serif" font-weight="700" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="2">CONTACT FORM</text>
  <text x="128" y="212" font-family="'Arial', sans-serif" font-weight="400" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="1.5">INTEGRATION</text>

  <!-- Decorative dots -->
  <circle cx="128" cy="232" r="3" fill="url(#accent)" opacity="0.7"/>
  <circle cx="118" cy="232" r="2" fill="#475569" opacity="0.5"/>
  <circle cx="138" cy="232" r="2" fill="#475569" opacity="0.5"/>
</svg>
